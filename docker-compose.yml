services:
  kafka:
    image: apache/kafka:4.0.2
    container_name: kafka-broker-1
    ports:
      - "9092:9092"
    environment:
      # apache/kafka (official image) reads plain KAFKA_* vars, not the
      # Bitnami-style KAFKA_CFG_* prefix.
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8090:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=local-cluster
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
    depends_on:
      - kafka

  postgres:
    image: postgres:16-alpine
    container_name: peap-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=appuser
      - POSTGRES_PASSWORD=changeme
      - POSTGRES_DB=identity_db
    volumes:
      - ./services/init-db:/docker-entrypoint-initdb.d
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: peap-redis
    ports:
      - "6379:6379"

  identity-service:
    build:
      context: ./services
      dockerfile: identity-service/Dockerfile
    container_name: identity-service
    ports:
      - "8081:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/identity_db
      - SPRING_DATASOURCE_USERNAME=appuser
      - SPRING_DATASOURCE_PASSWORD=changeme
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - JWT_SECRET=dev-only-secret-change-me-please-0123456789ABCDEF
    depends_on:
      - postgres
      - kafka

  product-service:
    build:
      context: ./services
      dockerfile: product-service/Dockerfile
    container_name: product-service
    ports:
      - "8082:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/product_db
      - SPRING_DATASOURCE_USERNAME=appuser
      - SPRING_DATASOURCE_PASSWORD=changeme
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      - postgres
      - kafka

  voting-service:
    build:
      context: ./services
      dockerfile: voting-service/Dockerfile
    container_name: voting-service
    ports:
      - "8083:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/voting_db
      - SPRING_DATASOURCE_USERNAME=appuser
      - SPRING_DATASOURCE_PASSWORD=changeme
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
    depends_on:
      - postgres
      - redis
      - kafka

  review-service:
    build:
      context: ./services
      dockerfile: review-service/Dockerfile
    container_name: review-service
    ports:
      - "8084:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/review_db
      - SPRING_DATASOURCE_USERNAME=appuser
      - SPRING_DATASOURCE_PASSWORD=changeme
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      - postgres
      - kafka

  api-gateway:
    build:
      context: ./services
      dockerfile: api-gateway/Dockerfile
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      - IDENTITY_SERVICE_URI=http://identity-service:8080
      - PRODUCT_SERVICE_URI=http://product-service:8080
      - VOTING_SERVICE_URI=http://voting-service:8080
      - REVIEW_SERVICE_URI=http://review-service:8080
    depends_on:
      - identity-service
      - product-service
      - voting-service
      - review-service

volumes:
  postgres-data:
