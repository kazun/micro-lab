name: Build and push images

on:
  push:
    branches: [main]
    paths:
      - "services/**"
      - ".github/workflows/build-push.yaml"

env:
  REGISTRY: us-central1-docker.pkg.dev/peap-lab/peap

jobs:
  build-push:
    runs-on: ubuntu-latest
    # id-token: write is what lets the runner mint the OIDC token that
    # Workload Identity Federation exchanges for GCP credentials - no
    # service-account key is stored anywhere.
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build jars
        working-directory: services
        run: mvn -B clean package -DskipTests

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/596705075149/locations/global/workloadIdentityPools/github/providers/github-provider
          service_account: github-actions@peap-lab.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and push images
        working-directory: services
        run: |
          for svc in api-gateway identity-service product-service voting-service review-service analytics-service; do
            docker build -f "${svc}/Dockerfile" \
              -t "${REGISTRY}/${svc}:${GITHUB_SHA::7}" \
              -t "${REGISTRY}/${svc}:latest" .
            docker push --all-tags "${REGISTRY}/${svc}"
          done
