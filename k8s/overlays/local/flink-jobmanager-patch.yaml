apiVersion: apps/v1
kind: Deployment
metadata:
  name: flink-jobmanager
spec:
  template:
    spec:
      containers:
        - name: flink-jobmanager
          image: peap/fraud-detection-job:local
          env:
            # lower threshold + short block so the demo is easy to trip
            - name: REQUEST_THRESHOLD
              value: "20"
            - name: BLOCK_TTL_SECONDS
              value: "120"
