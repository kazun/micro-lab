apiVersion: apps/v1
kind: Deployment
metadata:
  name: review-service
spec:
  replicas: 3
  template:
    spec:
      containers:
        - name: review-service
          image: peap/review-service:prod
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
